<!-- ── LOGIN PAGE ─────────────────────────── -->
<div id="login-page">
  <div class="login-grid"></div>
  <div class="login-box">
    <div class="login-logo">
      <div class="login-logo-icon">🧬</div>
      <h1>Med<span>Graph</span></h1>
    </div>
    <p class="login-tagline">// HEALTHCARE KNOWLEDGE GRAPH SYSTEM</p>
    <h2>Sign In to Continue</h2>
    <div class="form-group">
      <label>Username</label>
      <input type="text" id="login-username" placeholder="Enter username" autocomplete="off">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="login-password" placeholder="Enter password">
    </div>
    <div class="form-group">
      <label>Role</label>
      <select id="login-role">
        <option value="admin">👑 Admin</option>
        <option value="doctor">🩺 Doctor</option>
        <option value="user">🧑‍💼 User (Staff)</option>
      </select>
    </div>
    <button class="btn-primary" onclick="doLogin()">Sign In →</button>
    <div class="login-error" id="login-error"></div>
    <div class="login-creds">
      <p><strong>admin</strong> / admin123 (Admin) &nbsp;|&nbsp; <strong>dr_smith</strong> / doctor123 (Doctor)</p>
      <p><strong>receptionist</strong> / user123 (User)</p>
    </div>
  </div>
</div>
